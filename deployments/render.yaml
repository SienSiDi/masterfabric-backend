services:
  - type: web
    runtime: docker
    name: mf-masterfabric-backend
    dockerfilePath: deployments/Dockerfile
    dockerContext: .
    region: oregon
    healthCheckPath: /health/live
    envVars:
      - key: DATABASE_DSN
        fromDatabase:
          name: mf-masterfabric-pg
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: mf-masterfabric-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL_MINUTES
        value: "15"
      - key: JWT_REFRESH_TTL_HOURS
        value: "168"
      - key: LOG_LEVEL
        value: info
      - key: LOG_FORMAT
        value: json
      - key: CORS_ALLOWED_ORIGINS
        value: ""

  - type: keyvalue
    name: mf-masterfabric-redis
    region: oregon
    plan: starter
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow all (private network)

databases:
  - name: mf-masterfabric-pg
    databaseName: masterfabric
    user: masterfabric
    region: oregon
    plan: starter
